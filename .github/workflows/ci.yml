name: Backend CI Pipeline

on:
  pull_request:
    branches:
      - main
    paths:
      - 'BEGA_PROJECT/**'
      - '.github/workflows/ci.yml'
  push:
    branches:
      - main
      - develop
    paths:
      - 'BEGA_PROJECT/**'
      - '.github/workflows/ci.yml'

concurrency:
  group: backend-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SPRING_PROFILES_ACTIVE: dev
      # Secrets are available only on trusted branch pushes. Pull request code
      # must never receive repository credentials, even for same-repository PRs.
      DB_URL: ${{ github.event_name == 'push' && secrets.DB_URL || '' }}
      DB_USERNAME: ${{ github.event_name == 'push' && secrets.DB_USERNAME || '' }}
      DB_PASSWORD: ${{ github.event_name == 'push' && secrets.DB_PASSWORD || '' }}
      MAIL_USERNAME: ${{ github.event_name == 'push' && secrets.MAIL_USERNAME || 'ci' }}
      MAIL_PASSWORD: ${{ github.event_name == 'push' && secrets.MAIL_PASSWORD || 'ci' }}
      GOOGLE_CLIENT_ID: ${{ github.event_name == 'push' && secrets.GOOGLE_CLIENT_ID || 'ci-google-client' }}
      GOOGLE_CLIENT_SECRET: ${{ github.event_name == 'push' && secrets.GOOGLE_CLIENT_SECRET || 'ci-google-secret' }}
      KAKAO_CLIENT_ID: ${{ github.event_name == 'push' && secrets.KAKAO_CLIENT_ID || 'ci-kakao-client' }}
      KAKAO_CLIENT_SECRET: ${{ github.event_name == 'push' && secrets.KAKAO_CLIENT_SECRET || 'ci-kakao-secret' }}
      NAVER_CLIENT_ID: ${{ github.event_name == 'push' && secrets.NAVER_CLIENT_ID || 'ci-naver-client' }}
      NAVER_CLIENT_SECRET: ${{ github.event_name == 'push' && secrets.NAVER_CLIENT_SECRET || 'ci-naver-secret' }}
      JWT_SECRET: ${{ github.event_name == 'push' && secrets.JWT_SECRET || 'ci-jwt-secret' }}
      SUPABASE_URL: ${{ github.event_name == 'push' && secrets.SUPABASE_URL || 'http://127.0.0.1:54321' }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ github.event_name == 'push' && secrets.SUPABASE_SERVICE_ROLE_KEY || '' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'
      
      - name: Grant execute permission
        working-directory: ./BEGA_PROJECT
        run: chmod +x gradlew

      - name: Run API contract serialization tests
        working-directory: ./BEGA_PROJECT
        run: |
          ./gradlew test \
            --tests "*FollowDtoSerializationTest*" \
            --tests "*BooleanIsFieldSerializationTest*" \
            -Dwebp.strict=false

      - name: Verify committed OpenAPI contract
        working-directory: ./BEGA_PROJECT
        run: ./gradlew test --tests "*BackendOpenApiContractTest" -Dwebp.strict=false

      - name: Run migration safety gate
        working-directory: ./BEGA_PROJECT
        run: ./gradlew migrationSafetyCheck -Dwebp.strict=false
      
      - name: Run tests
        working-directory: ./BEGA_PROJECT
        run: ./gradlew test -Dwebp.strict=false
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: BEGA_PROJECT/build/test-results/test/
          retention-days: 7
      
      - name: Test Summary
        if: always()
        run: |
          echo "### Test Results" >> "${GITHUB_STEP_SUMMARY}"
          echo "Unit tests completed!" >> "${GITHUB_STEP_SUMMARY}"

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Trivy vulnerability scanner in repo mode
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          exit-code: '1'
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  build:
    name: Build Application
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [test, security]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'
      
      - name: Grant execute permission
        working-directory: ./BEGA_PROJECT
        run: chmod +x gradlew
      
      - name: Build with Gradle
        working-directory: ./BEGA_PROJECT
        run: ./gradlew build -x test
      
      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: backend-jar
          path: BEGA_PROJECT/build/libs/*.jar
          retention-days: 7
      
      - name: Build Summary
        run: |
          echo "### Build Success" >> "${GITHUB_STEP_SUMMARY}"
          echo "Application built successfully!" >> "${GITHUB_STEP_SUMMARY}"
